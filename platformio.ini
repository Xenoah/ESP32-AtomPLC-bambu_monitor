[env:m5atom]
platform = espressif32
board = m5stack-atom
framework = arduino

monitor_speed = 115200
upload_speed  = 115200

lib_ldf_mode = deep+

lib_deps =
    m5stack/M5Atom
    fastled/FastLED
    adafruit/Adafruit GFX Library
    adafruit/Adafruit SSD1306
    adafruit/Adafruit MCP23017 Arduino Library